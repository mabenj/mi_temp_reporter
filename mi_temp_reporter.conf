# mi_temp_reporter.conf
# Place at one of:
#   /etc/mi_temp_reporter.conf
#   ~/.config/mi_temp_reporter.conf
#   ./mi_temp_reporter.conf
# Or pass explicitly: python3 mi_temp_reporter.py --config /path/to/this/file
#
# All values can also be overridden via environment variables: MI_TEMP_<KEY>
# e.g. MI_TEMP_API_TOKEN=mysecret

[mi_temp]

# Full path to MiTemperature2.py
mitemp_script = /home/pi/MiTemperature2/MiTemperature2.py

# Path to sensors.ini device list — only callbacks for listed sensors are fired.
# Comment out to receive from all sensors in range.
devicelist_file = sensors.ini

# How often to take a reading and POST it (seconds). Default = 3600 (1 hour).
interval_seconds = 3600

# How long to run MiTemperature2 per cycle before killing it (seconds).
# Must be well below interval_seconds. 60 s is plenty for ATC/pvvx firmware.
scan_timeout_seconds = 60

api_url = https://your-api-endpoint.example.com/readings

# HTTP retry settings
http_retries = 3
http_retry_delay = 10

log_file = /var/log/mi_temp_reporter.log
log_max_bytes = 5242880
log_backup_count = 3